spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 2000MB
      max-request-size: 2000MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    locations: classpath:db/migration

